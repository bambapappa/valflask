name: mirror
on:
  workflow_run:
    workflows: [build]
    types: [completed]
    branches: [main]
permissions:
  contents: read
jobs:
  netlify:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: pnpm/action-setup@v4  # ogiltig SHA-pin ersatt 2026-06-15
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: site
      - run: pnpm build
        working-directory: site
      - name: Deploy to Netlify (if token exists)
        # Netlify är en VARM RESERV (§16), inte primär — ett deploy-fel (t.ex.
        # 403 på utgången token) får aldrig fälla speglingen. Loggar en varning
        # och fortsätter. Primären (GitHub Pages) är opåverkad.
        run: |
          if [ -n "${NETLIFY_AUTH_TOKEN}" ]; then
            npx netlify-cli deploy --prod --dir site/dist --auth "$NETLIFY_AUTH_TOKEN" --site "$NETLIFY_SITE_ID" || {
              echo "::warning::Netlify-deploy misslyckades (sannolikt ogiltig NETLIFY_AUTH_TOKEN eller fel NETLIFY_SITE_ID — 403). Speglingen hoppas över; ej kritiskt. Återställ genom att förnya token + verifiera site-id."
            }
          else
            echo "SKIP: Netlify deploy skipped — secrets.NETLIFY_AUTH_TOKEN not set."
            echo "Ägarsteg: configure NETLIFY_AUTH_TOKEN + NETLIFY_SITE_ID in GitHub Secrets."
          fi
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
