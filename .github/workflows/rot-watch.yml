# Frågevågen — källröta-bevakningen (SPEC-FRAGEVAGEN.md §6.3, veckovis).
#
# VILANDE TILLS LANSERING (ops/FRAGEVAGEN-LANSERING.md steg 4): jobbet kör bara
# när repovariabeln STANCES_ENABLED är "true" — schemat kan alltså mergas utan
# att något händer. Re-hämtar källorna för publicerade besked; borttagna eller
# omskrivna källor stämplas synligt (arkivkopian gäller). Tyst rättelse är
# förbjuden — statusändringar committas som data och syns på sajten.
name: rot-watch
on:
  schedule:
    - cron: "40 4 * * 1"   # måndagar 04:40 UTC (efter helgen, före veckans första pipeline-körning)
  workflow_dispatch: {}
permissions:
  contents: write
concurrency: { group: rot-watch, cancel-in-progress: false }
jobs:
  check:
    if: ${{ vars.STANCES_ENABLED != 'false' }}  # samma default-PÅ som pipeline.yml; ofarlig no-op tills besked finns
    runs-on: ubuntu-latest
    steps:
      - name: Mint bot app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true
      - uses: pnpm/action-setup@v4  # samma pin-undantag som pipeline.yml (2026-06-15)
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pipeline/pnpm-lock.yaml
      - name: Install pipeline deps
        run: pnpm install --frozen-lockfile
        working-directory: pipeline
      - name: Källröta-kontroll
        run: pnpm stances:rot-check
        working-directory: pipeline
      - name: Commit data if changed
        run: |
          git config user.name "drygast-bot" && git config user.email "bot@drygast.nu"
          git add data/stances.json && git diff --cached --quiet || git commit -m "data: källröta-kontroll $(date -u +%F) (run ${{ github.run_id }})"
          git push
