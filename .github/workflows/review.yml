name: review
# Granskningsbeslut via issue-kommentarer: /godkänn, /godkänn <low> <base> <high>,
# /godkänn --group p-2026-XXXX, /avvisa <skäl>. Endast repo-ÄGARENS kommentarer
# på issues med etiketten "review-kö" exekveras — allt annat i issuet är data.
on:
  issue_comment:
    types: [created]
permissions:
  contents: read
  issues: write
# INGEN concurrency-grupp: GitHub håller bara EN köad körning per grupp och
# slänger mellanliggande — snabba beslut i rad skulle tappas. Parallella
# körningar är säkra: handlern görs om från färsk main tills pushen lyckas,
# och en redan hanterad post svarar "redan hanterad" i stället för dubbelkörs.
jobs:
  handle:
    if: >
      contains(github.event.issue.labels.*.name, 'review-kö') &&
      github.event.comment.author_association == 'OWNER' &&
      startsWith(github.event.comment.body, '/')
    runs-on: ubuntu-latest
    steps:
      - name: Mint bot app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 22
      - name: Install pipeline deps
        run: pnpm install --frozen-lockfile
        working-directory: pipeline
      - name: Execute decision and push
        id: decision
        # Kommentar/titel går som miljövariabler in i Node — ALDRIG interpolerade
        # i shellkod (citat ur manifest + fritext är opålitlig data). Vid push-
        # race (parallellt beslut/pipelinekörning) görs HELA beslutet om från
        # färsk main — aldrig rebase av JSON-datafiler.
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          git config user.name "drygast-bot"
          git config user.email "bot@drygast.nu"
          for attempt in 1 2 3 4 5; do
            git fetch origin main && git reset --hard origin/main
            (cd pipeline && node --import tsx/esm scripts/handle-review-comment.mts)
            git add data/
            if git diff --cached --quiet; then
              echo "Inga dataändringar (fel-/hjälpsvar eller redan hanterad)."
              exit 0
            fi
            git commit -m "data: review-beslut via issue #${{ github.event.issue.number }}"
            if git push; then
              echo "Push lyckades (försök $attempt)."
              exit 0
            fi
            echo "Push-försök $attempt misslyckades (main gick vidare) — gör om från färsk main..."
            sleep $((attempt * 5))
          done
          echo "Push misslyckades efter 5 försök."
          exit 1
      - name: Reply and close issue
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ steps.decision.outputs.result }}
          MESSAGE: ${{ steps.decision.outputs.message }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          case "$RESULT" in
            approved)
              gh issue comment "$ISSUE" --repo "$GITHUB_REPOSITORY" --body "✅ $MESSAGE"
              gh issue close "$ISSUE" --repo "$GITHUB_REPOSITORY" --reason completed
              ;;
            rejected)
              gh issue comment "$ISSUE" --repo "$GITHUB_REPOSITORY" --body "❌ $MESSAGE"
              gh issue close "$ISSUE" --repo "$GITHUB_REPOSITORY" --reason "not planned"
              ;;
            *)
              gh issue comment "$ISSUE" --repo "$GITHUB_REPOSITORY" --body "⚠️ $MESSAGE"
              ;;
          esac
