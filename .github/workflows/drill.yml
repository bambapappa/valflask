name: drill
on:
  schedule:
    - cron: "0 4 1 * *"   # Första dagen i månaden, 04:00 UTC
  workflow_dispatch: {}
permissions:
  contents: read
  issues: write
jobs:
  drill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      # Drillen bygger från en ren klon men behöver ändå toolchain (node + pnpm)
      # i miljön — annars faller pnpm install på "command not found" (exit 127).
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 22
      - name: Run drill
        run: bash ops/drill.sh
        timeout-minutes: 15
      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `ALERT: Månadsdrill misslyckades (${new Date().toISOString().slice(0,10)})`,
              body: `Drill-workflow misslyckades. Se Actions-logg för detaljer.\n\n- Workflow: ${context.workflow}\n- Run: ${context.runId}\n- Commit: ${context.sha}\n\nÅtgärd: kör \\"bash ops/drill.sh\\" lokalt och undersök felet.`
            });
