name: drill
on:
  schedule:
    - cron: "0 4 1 * *"   # Första dagen i månaden, 04:00 UTC
  workflow_dispatch: {}
permissions:
  contents: read
  issues: write
jobs:
  drill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run drill
        run: bash ops/drill.sh
        timeout-minutes: 15
      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `ALERT: Månadsdrill misslyckades (${new Date().toISOString().slice(0,10)})`,
              body: `Drill-workflow misslyckades. Se Actions-logg för detaljer.\n\n- Workflow: ${context.workflow}\n- Run: ${context.runId}\n- Commit: ${context.sha}\n\nÅtgärd: kör \\"bash ops/drill.sh\\" lokalt och undersök felet.`
            });
