name: review-sync
# Manuell synk av review-kön → GitHub-issues (backfill / ikappkörning).
# Pipelinekörningen synkar också, men max SYNC_CAP issues per körning —
# denna workflow låter oss beta av en stor kö utan att vänta på schemat.
on:
  workflow_dispatch:
    inputs:
      cap:
        description: "Max antal issues att skapa denna körning"
        required: false
        default: "60"
permissions:
  contents: read
  issues: write
concurrency:
  group: review-sync
  cancel-in-progress: false
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38  # v6.5.0
        with:
          node-version: 22
      - name: Install pipeline deps
        run: pnpm install --frozen-lockfile
        working-directory: pipeline
      - name: Sync review-kö till issues
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SYNC_CAP: ${{ inputs.cap }}
        run: node --import tsx/esm scripts/sync-review-issues.mts
        working-directory: pipeline
