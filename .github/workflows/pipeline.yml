name: pipeline
on:
  schedule:
    - cron: "10 3,9,15 * * *"   # UTC → 05:10, 11:10, 17:10 svensk sommartid
  workflow_dispatch: {}
permissions:
  contents: write
  issues: write
concurrency:
  group: pipeline
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Mint bot app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_KEY }}
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true
      - uses: pnpm/action-setup@v4  # ogiltig SHA-pin ersatt 2026-06-15
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - name: Install pipeline deps
        run: pnpm install --frozen-lockfile
        working-directory: pipeline
      - name: Run pipeline tests
        run: pnpm test
        working-directory: pipeline
      - name: T7 check
        run: pnpm check-t7
        working-directory: pipeline
        continue-on-error: true
      - name: Install site deps
        run: pnpm install --frozen-lockfile
        working-directory: site
      - name: Run pipeline
        run: pnpm pipeline:run
        working-directory: pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_FALLBACK_BASE_URL: ${{ secrets.LLM_FALLBACK_BASE_URL }}
          LLM_FALLBACK_API_KEY: ${{ secrets.LLM_FALLBACK_API_KEY }}
          MODEL_EXTRACT: ${{ vars.MODEL_EXTRACT }}
          MODEL_VERIFY: ${{ vars.MODEL_VERIFY }}
          MODEL_COPY: ${{ vars.MODEL_COPY }}
          PIPELINE_MODE: ${{ vars.PIPELINE_MODE }}
          ALERT_EMAIL: ${{ vars.ALERT_EMAIL }}
      - name: Commit data if changed
        run: |
          git config user.name "drygast-bot"
          git config user.email "bot@drygast.nu"
          git add data/
          if git diff --cached --quiet; then
            echo "Inga dataändringar — inget att committa."
            exit 0
          fi
          git commit -m "data: pipeline run ${{ github.run_id }}"
          # main kan ha gått vidare (mergad PR) sedan checkout → rebasa och försök igen,
          # annars avvisas push:en som non-fast-forward och hela körningen failar.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "Push lyckades (försök $attempt)."
              exit 0
            fi
            echo "Push-försök $attempt misslyckades (main har troligen gått vidare). Försöker igen..."
            sleep $((attempt * 5))
          done
          echo "Push misslyckades efter 5 försök."
          exit 1
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: run-report
          path: pipeline/.report/
          if-no-files-found: ignore
