name: pipeline
on:
  schedule:
    - cron: "10 3,9,15 * * *"   # UTC → 05:10, 11:10, 17:10 svensk sommartid
  workflow_dispatch: {}
permissions:
  contents: write
  issues: write
concurrency:
  group: pipeline
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Mint bot app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true
      - uses: pnpm/action-setup@v4  # ogiltig SHA-pin ersatt 2026-06-15
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - name: Install pipeline deps
        run: pnpm install --frozen-lockfile
        working-directory: pipeline
      - name: Run pipeline tests
        run: pnpm test
        working-directory: pipeline
      - name: T7 check
        run: pnpm check-t7
        working-directory: pipeline
        continue-on-error: true
      - name: Install site deps
        run: pnpm install --frozen-lockfile
        working-directory: site
      - name: Run pipeline
        run: pnpm pipeline:run
        working-directory: pipeline
        env:
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_FALLBACK_BASE_URL: ${{ vars.LLM_FALLBACK_BASE_URL || secrets.LLM_FALLBACK_BASE_URL }}
          LLM_FALLBACK_API_KEY: ${{ secrets.LLM_FALLBACK_API_KEY }}
          MODEL_EXTRACT: ${{ vars.MODEL_EXTRACT }}
          MODEL_VERIFY: ${{ vars.MODEL_VERIFY }}
          MODEL_COPY: ${{ vars.MODEL_COPY }}
          PIPELINE_MODE: ${{ vars.PIPELINE_MODE }}
          # Frågevågen PÅ som default (ägarbeslut 2026-07-11); stäng av genom att
          # sätta repovariabeln STANCES_ENABLED=false. STANCES_MODE osatt = review
          # (torrkörning, steg 2) — växlas till auto först i steg 4.
          STANCES_ENABLED: ${{ vars.STANCES_ENABLED || 'true' }}
          STANCES_MODE: ${{ vars.STANCES_MODE }}
          ALERT_EMAIL: ${{ vars.ALERT_EMAIL }}
      # Arkiv-backfill (SPEC §6.2 "nytt försök tills satt"): fyll archive_url för
      # publicerade löften som saknar det (seed/review-godkännanden sätter null).
      # Bunden budget saves/run — snällt mot Wayback; nullen dräneras över dagar.
      # Best-effort: får aldrig fälla datakörningen.
      - name: Arkiv-backfill (Wayback)
        continue-on-error: true
        run: node --import tsx/esm scripts/archive-backfill.mts save 12
        working-directory: pipeline
      # App-tokens lever 1 h. Pipelinesteget kan ta längre (första manifest-
      # körningen tog 71 min) — då är jobbstart-tokenen död vid push och datan
      # går förlorad (run 28673246764). Mynta därför en FÄRSK token efter
      # LLM-steget, precis före commit/push.
      - name: Mint fresh push token
        id: push-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_KEY }}
      - name: Commit data if changed
        env:
          PUSH_TOKEN: ${{ steps.push-token.outputs.token }}
        run: |
          git config user.name "drygast-bot"
          git config user.email "bot@drygast.nu"
          # Checkout-stegets persisted auth-header bär jobbstart-tokenen (kan ha
          # gått ut) och vinner över remote-URL:en — rensa den och pusha med den
          # färska tokenen i stället.
          git config --local --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${{ github.repository }}.git"
          git add data/
          if git diff --cached --quiet; then
            echo "Inga dataändringar — inget att committa."
            exit 0
          fi
          git commit -m "data: pipeline run ${{ github.run_id }}"
          # main kan ha gått vidare (mergad PR) sedan checkout → rebasa och försök igen,
          # annars avvisas push:en som non-fast-forward och hela körningen failar.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "Push lyckades (försök $attempt)."
              exit 0
            fi
            echo "Push-försök $attempt misslyckades (main har troligen gått vidare). Försöker igen..."
            sleep $((attempt * 5))
          done
          echo "Push misslyckades efter 5 försök."
          exit 1
      # Review-kön → GitHub-issues (ett per post; beslut via review.yml).
      # Idempotent och best-effort — issue-synk får aldrig fälla datakörningen.
      - name: Sync review-kö till issues
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node --import tsx/esm scripts/sync-review-issues.mts
        working-directory: pipeline
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: run-report
          path: pipeline/.report/
          if-no-files-found: ignore
