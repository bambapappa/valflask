name: release
on:
  schedule:
    - cron: "0 5 * * 1"   # Måndagar 05:00 UTC
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Configure git
        run: |
          git config user.name "drygast-bot"
          git config user.email "bot@drygast.nu"
      - name: Create annotated tag
        run: |
          TAG="release/v$(date +%Y-%m-%d)"
          git tag -a "$TAG" -m "Weekly release $(date +%Y-%m-%d)"
          git push origin "$TAG"
      - name: Create GitHub Release
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const tag = `release/v${new Date().toISOString().slice(0,10)}`;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: `Veckovis release-tagg för drygast.nu.\n\n- Data-hash: se integrity.json i byggt artifact\n- Deploy: Cloudflare Pages (primär), GitHub Pages, Netlify\n\n**GPG-signering:** ägarsteg — när GPG-nyckel är konfigurerad, byt till \\"git tag -s\\" i workflow.`
            });
      - name: Mirror to secondary remote (if configured)
        run: |
          if git remote | grep -q secondary; then
            git push secondary --tags
            git push secondary main
            echo "Secondary mirror pushed."
          else
            echo "No secondary remote configured — ägarsteg (se RUNBOOK)."
          fi
