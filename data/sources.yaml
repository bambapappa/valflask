    type: page
    url: "https://sd.se/vad-vi-vill/"
    verified: "2026-07-02 — 200 (via redirect), SD:s politik; manifest ej publicerat ännu"

  # V — valplattform beslutad på kongressen 2026 (PDF) + valsida
