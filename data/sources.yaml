  # --- Skrivna manifest/policysidor (page) ---
  # Partiernas skrivna löften finns inte som RSS. "page"-typen hämtar en HTML-sida,
  # strippar den till text och kör LLM-extraktion + grindarna. Så fångas manifest
  # löpande i stället för manuell skörd. Lägg till policy-undersidor för mer djup.
  # (S och C saknar RSS helt — page är enda vägen för deras skrivna löften.)
  - id: c-valmanifest
    type: page
    url: "https://val2026.centerpartiet.se/"
    verified: "2026-07-02 — 200, Centerpartiets valmanifest 2026 (sammanfattningssida)"
  - id: c-valmanifest-pdf
    type: page
    url: "https://val2026.centerpartiet.se/wp-content/uploads/2026/06/Valmanifest-2026.pdf"
