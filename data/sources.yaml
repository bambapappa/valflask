  # --- Skrivna manifest/policysidor (page) ---
  # Partiernas skrivna löften finns inte som RSS. "page"-typen hämtar en HTML-sida
  # ELLER PDF, extraherar text och kör LLM-extraktion + grindarna. Sidorna
  # ändringsbevakas (contentHash i seen) och manifest-PDF:er länkade från en sida
  # auto-följs (samma domän, .pdf + manifest/valplattform/valprogram i sökvägen).
  # DÄRFÖR ska VARJE parti ha minst en valsida här även innan manifestet släppts:
  # den dag partiet länkar sin manifest-PDF fångas den automatiskt.
  # Läge 2026-07-03: fullt manifest publicerat av C (96 s.), L (40 s.);
  # valplattform av S (4 s.), V (4 s.); MP har HTML-utkast; M/SD/KD ej ännu.

  # C — fullt manifest (PDF) + sammanfattningssida
  - id: c-valmanifest
    type: page
    url: "https://val2026.centerpartiet.se/"
    verified: "2026-07-02 — 200, Centerpartiets valmanifest 2026 (sammanfattningssida; länkar PDF:en)"
  - id: c-valmanifest-pdf
    type: page
    url: "https://val2026.centerpartiet.se/wp-content/uploads/2026/06/Valmanifest-2026.pdf"
    verified: "2026-07-03 — 200, application/pdf, 96 s. — hela valmanifestet (sha256 69013e13c1ab…)"

  # S — valplattform (PDF) + val-2026-sida (länkar PDF:en; ingen RSS)
  - id: s-valmanifest
    type: page
    url: "https://www.socialdemokraterna.se/val-2026"
    verified: "2026-07-03 — 200, S:s val-2026-sida; länkar Valplattform.pdf"
  - id: s-valplattform-pdf
    type: page
    url: "https://www.socialdemokraterna.se/download/18.68544bb219c4794c4a4684c/1771599906618/Valplattform.pdf"
    verified: "2026-07-03 — 200, application/pdf, 4 s., CreationDate 2026-02-04"

  # M — inget valmanifest publicerat ännu; politiksidan bevakas (auto-följ tar PDF:en när den släpps)
  - id: m-politik
    type: page
    url: "https://moderaterna.se/var-politik/"
    verified: "2026-07-03 — 200, M:s politiksida; manifest ej publicerat ännu"

  # SD — inget valmanifest publicerat ännu; politiksidan bevakas
